name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Lint — fast, runs first
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check src/ tools/ --output-format=github

      - name: Run ruff format check
        run: ruff format src/ tools/ --check

  # ---------------------------------------------------------------------------
  # Unit + integration tests
  # ---------------------------------------------------------------------------
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    env:
      # Point at test databases and disable real external calls
      CATALYNX_ENV: test
      TESTING: "true"
      DATABASE_URL: "sqlite:///./test_catalynx.db"
      AI_LITE_MODEL: "gpt-4o-mini"
      AI_HEAVY_MODEL: "gpt-4o-mini"
      AI_RESEARCH_MODEL: "gpt-4o-mini"
      OPENAI_API_KEY: "test-key-not-used"
      API_KEY_GRANTS_GOV: "test-key"
      API_KEY_PROPUBLICA: "test-key"
      CORS_ALLOWED_ORIGINS: "http://localhost:8000"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: |
          pytest tests/unit/ tools/*/tests/ \
            --ignore=tools/shared_schemas \
            -m "not integration and not performance and not external and not slow" \
            --cov=src --cov=tools \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=40 \
            -q

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.11'
        with:
          name: coverage-xml
          path: coverage.xml

  # ---------------------------------------------------------------------------
  # Security scan — bandit static analysis
  # ---------------------------------------------------------------------------
  security:
    name: Security scan (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit
        run: |
          bandit -r src/ tools/ \
            --exclude src/processors/_deprecated,tests \
            -ll \
            --format github \
            -c pyproject.toml || true
        # `|| true` — report findings but don't fail the pipeline yet;
        # tighten once baseline is established.

  # ---------------------------------------------------------------------------
  # Type checking — mypy
  # ---------------------------------------------------------------------------
  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run mypy on core web layer
        run: |
          mypy src/web/main.py src/web/routers/ src/middleware/ \
            --ignore-missing-imports \
            --no-error-summary \
            || true
        # `|| true` — establish baseline first before enforcing
